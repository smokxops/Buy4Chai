<svg width="240" height="48" viewBox="0 0 240 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="badgeBg" x1="0" y1="0" x2="240" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5E3C" />
      <stop offset="100%" stop-color="#6D482F" />
    </linearGradient>
    <filter id="shadow" x="-2" y="-2" width="244" height="52">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="240" height="48" rx="12" fill="url(#badgeBg)" filter="url(#shadow)"/>
  
  <!-- Logo Section (miniature of logo.svg) -->
  <g transform="translate(10, 4) scale(0.1)">
    <!-- Glass -->
    <path d="M140 100L165 350C165 365 180 375 200 375C220 375 235 365 235 350L260 100" fill="white" fill-opacity="0.2" />
    <!-- Tea -->
    <path d="M144 140L165 345C165 358 180 368 200 368C220 368 235 358 235 345L256 140C256 140 200 155 144 140Z" fill="#E1954A" />
    <!-- Highlights -->
    <path d="M150 110C150 110 160 250 175 340" stroke="white" stroke-width="20" stroke-linecap="round" stroke-opacity="0.6" />
    <!-- Steam -->
    <g opacity="0.8">
      <path d="M180 80C180 80 170 60 185 45" stroke="white" stroke-width="12" stroke-linecap="round" fill="none" />
      <path d="M210 90C210 90 225 70 215 55" stroke="white" stroke-width="10" stroke-linecap="round" fill="none" />
    </g>
  </g>

  <!-- Text -->
  <text x="60" y="30" fill="#FDF8F3" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 700; letter-spacing: -0.01em;">
    Buy me a chai
  </text>
  
  <!-- Subtle Border Shine -->
  <rect x="0.5" y="0.5" width="239" height="47" rx="11.5" stroke="white" stroke-opacity="0.1" fill="none"/>
</svg>
