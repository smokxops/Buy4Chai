<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPI Aura | Premium Payment QR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --primary: #10b981;
            --primary-hover: #059669;
            --secondary: #3b82f6;
            --bg: #060b14;
            --card-bg: rgba(17, 24, 39, 0.85);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(16, 185, 129, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(59, 130, 246, 0.12) 0%, transparent 40%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 440px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            animation: cardAppear 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #34d399, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 300;
        }

        .form-grid {
            display: grid;
            gap: 16px;
            margin-bottom: 24px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-left: 4px;
        }

        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 12px 16px;
            color: white;
            font-size: 0.9rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        .qr-section {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 28px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            border: 1px solid var(--glass-border);
        }

        #qrcode {
            padding: 12px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            transition: transform 0.3s ease;
        }

        #qrcode:hover {
            transform: scale(1.02);
        }

        .actions {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn {
            padding: 14px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.85rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            grid-column: span 2;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            border: 1px solid var(--glass-border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-1px);
        }

        .deep-link-preview {
            font-size: 0.65rem;
            color: var(--text-muted);
            word-break: break-all;
            text-align: center;
            max-width: 240px;
            opacity: 0.4;
            font-family: monospace;
        }

        .copy-toast {
            position: fixed;
            bottom: 20px;
            background: var(--primary);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .copy-toast.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <div class="header">
                <h1>UPI Aura</h1>
                <p>Premium Payment QR Generator</p>
            </div>

            <div class="form-grid">
                <div class="field">
                    <label>UPI ID (VPA)</label>
                    <input type="text" id="pa" placeholder="e.g. 9883372128@upi" autocomplete="off">
                </div>
                <div class="field">
                    <label>Payee Name</label>
                    <input type="text" id="pn" placeholder="e.g. John Doe" autocomplete="off">
                </div>
                <div class="field" style="grid-template-columns: 1fr 1fr; display: grid; gap: 16px;">
                    <div>
                        <label>Amount (INR)</label>
                        <input type="number" id="am" placeholder="0.00" step="0.01">
                    </div>
                    <div>
                        <label>Note (Optional)</label>
                        <input type="text" id="tn" placeholder="For chai..." autocomplete="off">
                    </div>
                </div>
                <input type="hidden" id="cu" value="INR">
            </div>

            <div class="qr-section">
                <div id="qrcode"></div>
                <div class="deep-link-preview" id="link-preview">upi://pay?...</div>
                
                <div class="actions">
                    <button class="btn btn-primary" id="download-btn" onclick="downloadQR()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        Download QR
                    </button>
                    <button class="btn btn-secondary" onclick="copyLink()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                        Copy Link
                    </button>
                    <button class="btn btn-secondary" onclick="shareLink()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                        Share
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="copy-toast">Link copied!</div>

    <script>
        const inputs = ['pa', 'pn', 'am', 'tn', 'cu'];
        const qrcodeContainer = document.getElementById('qrcode');
        const linkPreview = document.getElementById('link-preview');
        
        const qrcode = new QRCode(qrcodeContainer, {
            width: 200,
            height: 200,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.M
        });

        function updateQR() {
            const pa = document.getElementById('pa').value.trim();
            const pn = document.getElementById('pn').value.trim();
            const am = document.getElementById('am').value.trim();
            const tn = document.getElementById('tn').value.trim();
            const cu = 'INR';

            if (!pa) {
                qrcode.clear();
                linkPreview.innerText = "Enter UPI ID to generate";
                return;
            }

            let upiLink = `upi://pay?pa=${encodeURIComponent(pa)}`;
            if (pn) upiLink += `&pn=${encodeURIComponent(pn)}`;
            if (am) upiLink += `&am=${encodeURIComponent(am)}`;
            if (tn) upiLink += `&tn=${encodeURIComponent(tn)}`;
            upiLink += `&cu=${encodeURIComponent(cu)}`;

            qrcode.makeCode(upiLink);
            linkPreview.innerText = upiLink;
        }

        function initFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            inputs.forEach(id => {
                const val = urlParams.get(id);
                if (val && document.getElementById(id)) {
                    document.getElementById(id).value = val;
                }
            });
            updateQR();
        }

        inputs.forEach(id => {
            const el = document.getElementById(id);
            if (el) el.addEventListener('input', updateQR);
        });

        function downloadQR() {
            const img = qrcodeContainer.querySelector('img');
            if (!img || !img.src) return;
            const link = document.createElement('a');
            link.download = `upi-payment-${document.getElementById('pa').value || 'qr'}.png`;
            link.href = img.src;
            link.click();
        }

        function copyLink() {
            const link = linkPreview.innerText;
            if (link.startsWith('upi://')) {
                navigator.clipboard.writeText(link);
                showToast("UPI Link copied!");
            }
        }

        function shareLink() {
            const link = window.location.href;
            navigator.clipboard.writeText(link);
            showToast("Generator URL copied!");
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        window.onload = initFromURL;
    </script>
</body>
</html>
