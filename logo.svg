<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Definitions for Gradients and Filters -->
  <defs>
    <!-- Tea Liquid Gradient -->
    <linearGradient id="teaGradient" x1="200" y1="120" x2="200" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E1954A" />
      <stop offset="50%" stop-color="#C0712C" />
      <stop offset="100%" stop-color="#8B4513" />
    </linearGradient>
    
    <!-- Glass Reflections -->
    <linearGradient id="glassReflect" x1="150" y1="100" x2="250" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.4" />
      <stop offset="50%" stop-color="white" stop-opacity="0.1" />
      <stop offset="100%" stop-color="white" stop-opacity="0.05" />
    </linearGradient>

    <!-- Steam Filter -->
    <filter id="steamBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" />
    </filter>
  </defs>

  <!-- Steam -->
  <g filter="url(#steamBlur)" opacity="0.6">
    <path d="M180 80C180 80 170 60 185 45C200 30 190 10 190 10" stroke="#FDF8F3" stroke-width="8" stroke-linecap="round" fill="none" />
    <path d="M210 90C210 90 225 70 215 55C205 40 215 20 215 20" stroke="#FDF8F3" stroke-width="6" stroke-linecap="round" fill="none" />
    <path d="M230 100C230 100 240 85 235 75C230 65 240 50 240 50" stroke="#FDF8F3" stroke-width="4" stroke-linecap="round" fill="none" />
  </g>

  <!-- The Glass Body -->
  <path d="M140 100L165 350C165 365 180 375 200 375C220 375 235 365 235 350L260 100" fill="white" fill-opacity="0.1" stroke="white" stroke-width="2" stroke-opacity="0.2" />
  
  <!-- The Tea Liquid -->
  <path d="M144 140L165 345C165 358 180 368 200 368C220 368 235 358 235 345L256 140C256 140 200 155 144 140Z" fill="url(#teaGradient)" />

  <!-- Liquid Surface Reflection -->
  <ellipse cx="200" cy="142" rx="56" ry="12" fill="#F4B87C" fill-opacity="0.4" />

  <!-- Glass Vertical Ridges (Realistic cutting chai glass texture) -->
  <line x1="170" y1="120" x2="185" y2="350" stroke="white" stroke-opacity="0.1" stroke-width="1" />
  <line x1="190" y1="120" x2="195" y2="368" stroke="white" stroke-opacity="0.2" stroke-width="1" />
  <line x1="210" y1="120" x2="205" y2="368" stroke="white" stroke-opacity="0.2" stroke-width="1" />
  <line x1="230" y1="120" x2="215" y2="350" stroke="white" stroke-opacity="0.1" stroke-width="1" />

  <!-- Highlights -->
  <path d="M150 110C150 110 160 250 175 340" stroke="url(#glassReflect)" stroke-width="6" stroke-linecap="round" stroke-opacity="0.6" />
  <path d="M250 110C250 110 240 250 225 340" stroke="white" stroke-opacity="0.1" stroke-width="4" stroke-linecap="round" />

  <!-- Rim Shine -->
  <path d="M140 100C140 100 200 115 260 100" stroke="white" stroke-opacity="0.4" stroke-width="3" stroke-linecap="round" />
</svg>
