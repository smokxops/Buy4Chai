<!DOCTYPE html>
<html>
<head>
    <title>UPI QR API</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            overflow: hidden;
        }
        #qrcode img {
            display: block;
        }
        .error {
            color: #ef4444;
            font-family: sans-serif;
            text-align: center;
            padding: 20px;
        }
        #ui-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-family: sans-serif;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            background: #f9fafb;
        }
        input {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            width: 260px;
        }
        button {
            padding: 12px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="content">
        <div id="ui-form" style="display: none;">
            <h2 style="margin-top:0">UPI QR API</h2>
            <input type="text" id="pa" placeholder="UPI ID (pa)">
            <input type="text" id="pn" placeholder="Payee Name (pn) - Optional">
            <input type="number" id="am" placeholder="Amount (am) - Optional">
            <button onclick="generateFromUI()">Generate API Link</button>
            <p id="result-link" style="font-size: 11px; word-break: break-all; color: #666;"></p>
        </div>
        <div id="qrcode"></div>
    </div>

    <script>
        function getParams() {
            const search = window.location.search;
            return new URLSearchParams(search);
        }

        function generateQR() {
            const params = getParams();
            const pa = params.get('pa');
            const pn = params.get('pn') || 'Payee';
            const am = params.get('am');
            const tn = params.get('tn');
            const cu = params.get('cu') || 'INR';

            if (!pa) {
                document.getElementById('ui-form').style.display = 'flex';
                return;
            }

            // Build UPI URI
            let upiUri = `upi://pay?pa=${encodeURIComponent(pa)}&pn=${encodeURIComponent(pn)}`;
            if (am) upiUri += `&am=${encodeURIComponent(am)}`;
            if (tn) upiUri += `&tn=${encodeURIComponent(tn)}`;
            upiUri += `&cu=${encodeURIComponent(cu)}`;

            // Clear UI
            document.getElementById('ui-form').style.removeProperty('display');
            document.getElementById('ui-form').style.display = 'none';

            // Generate
            const qrcode = new QRCode(document.getElementById("qrcode"), {
                text: upiUri,
                width: 256,
                height: 256,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.M
            });

            // If user wants raw data, they can inspect the image src
            // Or we could output to console
            console.log("UPI URI:", upiUri);
        }

        function generateFromUI() {
            const pa = document.getElementById('pa').value;
            const pn = document.getElementById('pn').value;
            const am = document.getElementById('am').value;

            let url = window.location.origin + window.location.pathname + `?pa=${pa}`;
            if (pn) url += `&pn=${pn}`;
            if (am) url += `&am=${am}`;

            document.getElementById('result-link').innerHTML = `Direct Image URL:<br><a href="${url}">${url}</a>`;
            window.location.href = url;
        }

        window.onload = generateQR;
    </script>
</body>
</html>
