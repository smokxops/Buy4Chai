  <text x="42" y="21" fill="#FDF8F3" style="font-family: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, monospace; font-size: 13px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;">
